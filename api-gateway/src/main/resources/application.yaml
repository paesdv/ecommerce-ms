spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**, /api/auth/**
        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/products/**
        - id: order-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/orders/**
        - id: notification-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/notifications/**

jwt:
  secret: ${JWT_SECRET}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL}/api/v2/spans
  tracing:
    sampling:
      probability: 1.0